# --- Oneshot tmux theme (auto-generated) ---
set -g status-style "bg=#070324,fg=#e8d5b7"
set -g message-style "bg=#070324,fg=#d4a54a"
set -g message-command-style "bg=#070324,fg=#d4a54a"
set -g mode-style "bg=#d4a54a,fg=#070324"

set -g status-left "#[fg=#070324,bg=#d4a54a,bold] #S "
set -g status-right "#[fg=#d4a54a]#{?client_prefix,PREFIX ,}#[fg=#b8a88a] %H:%M "
set -g status-left-length 40
set -g status-right-length 80
set -g window-status-separator ""

set -g window-status-format "#[fg=#b8a88a] #I:#W "
set -g window-status-current-format "#[fg=#070324,bg=#d4a54a,bold] #I:#W "

set -g pane-border-style "fg=#1a0544"
set -g pane-active-border-style "fg=#d4a54a"
setw -g clock-mode-colour "#d4a54a"
