# --- Oneshot tmux colors (auto-generated) ---
# Source this from tmux.conf.local to apply Oneshot palette.
tmux_conf_24b_colour=true

tmux_conf_theme_colour_1="#070324"
tmux_conf_theme_colour_2="#0f0544"
tmux_conf_theme_colour_3="#b8a88a"
tmux_conf_theme_colour_4="#d4a54a"
tmux_conf_theme_colour_5="#f0c860"
tmux_conf_theme_colour_6="#070324"
tmux_conf_theme_colour_7="#e8d5b7"
tmux_conf_theme_colour_8="#070324"
tmux_conf_theme_colour_9="#d4a54a"
tmux_conf_theme_colour_10="#2b0e77"
tmux_conf_theme_colour_11="#0f0544"
tmux_conf_theme_colour_12="#b8a88a"
tmux_conf_theme_colour_13="#e8d5b7"
tmux_conf_theme_colour_14="#070324"
tmux_conf_theme_colour_15="#070324"
tmux_conf_theme_colour_16="#0f0544"
tmux_conf_theme_colour_17="#0f0544"

tmux_conf_theme_left_separator_main='\uE0B0'
tmux_conf_theme_left_separator_sub='\uE0B1'
tmux_conf_theme_right_separator_main='\uE0B2'
tmux_conf_theme_right_separator_sub='\uE0B3'

tmux_conf_theme_status_left=" ❐ #S | ↑#{?uptime_y, #{uptime_y}y,}#{?uptime_d, #{uptime_d}d,}#{?uptime_h, #{uptime_h}h,}#{?uptime_m, #{uptime_m}m,} "
tmux_conf_theme_status_right=" #{prefix}#{mouse}#{pairing}#{synchronized} #{?battery_percentage,#{battery_percentage} ,}%R , %d %b | #{username}#{root} | #{hostname} "

tmux_conf_theme_status_left_fg=",#e8d5b7,#b8a88a"
tmux_conf_theme_status_left_bg="#d4a54a,#0f0544,#0f0544"
tmux_conf_theme_status_left_attr="bold,none,none"

tmux_conf_theme_status_right_fg="#b8a88a,#e8d5b7,#070324"
tmux_conf_theme_status_right_bg="#070324,#0f0544,#d4a54a"
tmux_conf_theme_status_right_attr="none,none,bold"

tmux_conf_copy_to_os_clipboard=true
tmux_conf_update_plugins_on_launch=false
tmux_conf_update_plugins_on_reload=false
tmux_conf_uninstall_plugins_on_reload=false
